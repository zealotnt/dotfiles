# ─── Nested-tmux toggle (paste this into OUTER tmux's ~/.tmux.conf) ───
#
# Default state: outer tmux owns Ctrl+a. Your `Ctrl+a` controls THIS (outer) tmux.
# Press F12       → outer goes silent. `Ctrl+a` passes through to the inner tmux.
#                   Status bar turns red as a reminder.
# Press F12 again → restore default; status bar back to normal.
#
# Only F12 is listened to while in "off" mode — any other key just passes through.

bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set -g status-style "bg=red,fg=white" \;\
  set -g window-status-current-style "fg=red,bg=white,bold" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -gu status-style \;\
  set -gu window-status-current-style \;\
  refresh-client -S

# Optional: also show a literal label "[PASS]" on the right of status bar
# while in passthrough mode. Add this *outside* the bind blocks if you want it
# permanently driven by the key-table state:
#   set -g status-right '#{?#{==:#{client_key_table},off},#[bg=red] PASS-THROUGH #[default] ,}#H %H:%M'
